name: Nightly reliability

on:
  schedule:
    - cron: "23 3 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  reliability:
    name: Fault, process, and compatibility suites
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24.16.0
          package-manager-cache: false

      - run: npm ci
      - run: npm run audit:production
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run format:check
      - run: npm run test:faults
      - run: npm run test:process
      - run: npm run test:compat
      - run: npm run test:package
      - run: npm run test:version-matrix
      - run: npm run test:soak
      - run: npm run benchmark:store
